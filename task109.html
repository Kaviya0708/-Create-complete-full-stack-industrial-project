<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise System Dashboard</title>
    <style>
        /* CSS STYLING OVERLAYS */
        :root {
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --bg-dark: #0f172a;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: 60px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
        }

        .layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        aside {
            width: 240px;
            background: var(--bg-dark);
            color: white;
            padding: 20px;
        }

        .menu-item {
            padding: 12px;
            color: #94a3b8;
            text-decoration: none;
            display: block;
            border-radius: 6px;
            margin-bottom: 5px;
        }

        .menu-item.active {
            background: var(--primary);
            color: white;
        }

        main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
        }

        .metric-card h3 {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .metric-card p {
            font-size: 24px;
            font-weight: bold;
        }

        .content-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-weight: 500;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-secondary { background: #e2e8f0; color: var(--text-main); }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        th { background: #f8fafc; color: var(--text-muted); }

        .pill {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .pill.in { background: #d1fae5; color: var(--success); }
        .pill.out { background: #fee2e2; color: var(--danger); }

        /* Modal styling */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
        }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group input, .form-group select {
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }
        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <h2>ApexStore Core</h2>
        <div>System Level: Active</div>
    </header>

    <div class="layout">
        <aside>
            <a href="#" class="menu-item active">Inventory Items</a>
            <a href="#" class="menu-item">System Analytics</a>
        </aside>

        <main>
            <div class="metrics">
                <div class="metric-card">
                    <h3>Net Asset Valuation</h3>
                    <p id="total-value">$0.00</p>
                </div>
                <div class="metric-card">
                    <h3>Tracked SKU Items</h3>
                    <p id="total-skus">0</p>
                </div>
            </div>

            <div class="content-panel">
                <div class="panel-header">
                    <h3>Stock Registry</h3>
                    <button class="btn btn-primary" id="open-modal">Create Registry Entry</button>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>SKU ID</th>
                            <th>Item Name</th>
                            <th>Category</th>
                            <th>Unit Value</th>
                            <th>Quantity</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div class="modal-overlay hidden" id="form-modal">
        <div class="modal">
            <h3 style="margin-bottom: 15px;">Register New Asset</h3>
            <form id="asset-form">
                <div class="form-group">
                    <label>Item Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="category">
                        <option value="Hardware">Hardware</option>
                        <option value="Software">Software</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" id="price" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="qty" min="0" required>
                </div>
                <div class="actions">
                    <button type="button" class="btn btn-secondary" id="close-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Asset</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
